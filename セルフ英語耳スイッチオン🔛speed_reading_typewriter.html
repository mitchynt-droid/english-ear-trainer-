<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英語耳🔛スイッチオン♪ Typewriter Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Poppins:wght@400;500;600&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--tf:#0ABAB5;--tfl:#E0F7F6;--tfm:#5DD5D1;--tfd:#078A86;--tfp:#F4FBFB;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Poppins',sans-serif;background:var(--tfp);min-height:100vh;}
.app{max-width:480px;margin:0 auto;padding-bottom:2rem;width:100%;}

.hdr{background:linear-gradient(130deg,#089994 0%,var(--tf) 45%,var(--tfm) 100%);
  padding:1.1rem 1.3rem 1.2rem;display:flex;align-items:center;gap:13px;
  position:relative;overflow:hidden;}
.hdr::before{content:'';position:absolute;top:-28px;right:-24px;width:100px;height:100px;
  background:rgba(255,255,255,0.13);border-radius:50%;}
.hdr::after{content:'';position:absolute;bottom:-18px;left:40%;width:64px;height:64px;
  background:rgba(255,255,255,0.08);border-radius:50%;}
.av{width:60px;height:60px;border-radius:50%;border:2.5px solid rgba(255,255,255,0.92);
  overflow:hidden;flex-shrink:0;box-shadow:0 3px 14px rgba(0,0,0,0.2);
  position:relative;z-index:1;background:#fff;}
.av img{width:100%;height:100%;object-fit:cover;object-position:50% 10%;}
.htx{position:relative;z-index:1;}
.hsub{font-size:10px;color:rgba(255,255,255,0.85);font-family:'Nunito',sans-serif;
  font-weight:700;letter-spacing:0.06em;margin-bottom:2px;}
.htitle{font-family:'Nunito',sans-serif;font-weight:900;font-size:15px;
  color:#fff;line-height:1.28;text-shadow:0 1px 3px rgba(0,0,0,0.15);}
.badge{display:inline-block;background:rgba(255,255,255,0.25);color:#fff;
  font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;
  font-family:'Nunito',sans-serif;letter-spacing:0.05em;margin-top:4px;}

.tabs{display:flex;margin:1rem 1rem 0;background:rgba(10,186,181,0.1);border-radius:11px;padding:3px;}
.tab{flex:1;padding:7px 8px;font-size:13px;font-weight:600;border:none;border-radius:9px;
  cursor:pointer;background:transparent;color:var(--tfd);font-family:'Poppins',sans-serif;transition:all .2s;}
.tab.active{background:var(--tf);color:#fff;box-shadow:0 2px 8px rgba(10,186,181,.35);}

.slbl{font-size:10.5px;font-weight:700;color:var(--tfd);letter-spacing:.07em;text-transform:uppercase;
  margin:1rem 1rem .45rem;display:flex;align-items:center;gap:5px;}
.slbl::after{content:'';flex:1;height:1px;background:rgba(10,186,181,.18);}

.mgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin:0 1rem;}
.mc{padding:10px 7px;background:#fff;border:1.5px solid rgba(10,186,181,.2);border-radius:12px;
  cursor:pointer;text-align:center;transition:all .2s;}
.mc:hover,.mc.sel{border-color:var(--tf);background:var(--tfl);}
.mi{font-size:18px;margin-bottom:3px;}
.mt{font-size:11px;font-weight:700;color:#333;font-family:'Nunito',sans-serif;}
.mc.sel .mt{color:var(--tfd);}
.ms{font-size:10px;color:#aaa;line-height:1.3;margin-top:2px;}
.mc.sel .ms{color:var(--tfd);opacity:.8;}

.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin:0 1rem;}
.pc{padding:10px 12px;background:#fff;border:1.5px solid rgba(10,186,181,.2);
  border-radius:12px;cursor:pointer;transition:all .2s;}
.pc:hover,.pc.sel{border-color:var(--tf);background:var(--tfl);}
.pt{font-size:12px;font-weight:700;color:#333;font-family:'Nunito',sans-serif;margin-bottom:2px;}
.pc.sel .pt{color:var(--tfd);}
.ps{font-size:11px;color:#aaa;}
.pc.sel .ps{color:var(--tf);}

.sbox{background:#fff;border:1.5px solid rgba(10,186,181,.2);border-radius:13px;
  padding:.9rem 1rem;margin:0 1rem;}
.sr{display:grid;grid-template-columns:66px 1fr 64px 24px;align-items:center;gap:7px;margin-bottom:7px;}
.sr .sl{font-size:12px;color:#666;font-weight:600;}
.sr input{font-size:13px;padding:5px 7px;border:1.5px solid rgba(10,186,181,.3);border-radius:8px;
  background:var(--tfp);color:#333;text-align:center;width:100%;outline:none;font-family:'Poppins',sans-serif;}
.sr input:focus{border-color:var(--tf);}
.sr .sw{font-size:10px;color:var(--tf);font-weight:700;}
.rmb{font-size:13px;cursor:pointer;background:none;border:none;color:#ddd;}
.rmb:hover{color:#f87171;}
.addb{width:100%;font-size:12px;color:var(--tf);background:none;border:1.5px dashed rgba(10,186,181,.35);
  border-radius:8px;padding:6px;cursor:pointer;margin-top:4px;font-weight:600;font-family:'Poppins',sans-serif;}
.addb:hover{background:var(--tfl);}

.gobtn{display:block;width:calc(100% - 2rem);margin:1rem 1rem 0;padding:13px;font-size:15px;
  font-weight:800;background:linear-gradient(135deg,var(--tf) 0%,var(--tfm) 100%);
  border:none;border-radius:14px;cursor:pointer;color:#fff;font-family:'Nunito',sans-serif;
  letter-spacing:.02em;box-shadow:0 4px 14px rgba(10,186,181,.38);transition:transform .15s,box-shadow .15s;}
.gobtn:hover{transform:translateY(-1px);box-shadow:0 6px 18px rgba(10,186,181,.44);}
.gobtn:active{transform:scale(.98);}

.pwrap{background:#fff;border:1.5px solid rgba(10,186,181,.2);border-radius:15px;
  padding:1.2rem;margin:0 1rem;}
.rmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;}
.rbadge{font-size:11px;padding:3px 12px;border-radius:20px;background:var(--tfl);
  color:var(--tfd);font-weight:700;font-family:'Nunito',sans-serif;border:1px solid rgba(10,186,181,.3);}
.rspd{font-size:11px;color:#bbb;}

/* タイプライター表示エリア */
.tdisplay{
  font-family:'Courier Prime', 'Courier New', monospace;
  font-size:15px;line-height:1.9;
  padding:1rem 1.1rem;
  background:var(--tfp);
  border-radius:12px;margin-bottom:1rem;
  min-height:170px;
  border:1px solid rgba(10,186,181,.1);
  white-space:pre-wrap;
  word-break:break-word;
  position:relative;
}
.ja-line{
  font-family:'Poppins',sans-serif;
  font-size:11px;
  color:var(--tfd);
  font-weight:600;
  display:block;
  line-height:1.6;
}
.en-line{
  font-size:15px;
  color:#1a1a1a;
  display:block;
  line-height:1.8;
}
/* カーソル点滅 */
.cursor{
  display:inline-block;
  width:2px;height:1.1em;
  background:var(--tf);
  vertical-align:text-bottom;
  margin-left:1px;
  animation:blink .6s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

.pgwrap{height:6px;background:var(--tfl);border-radius:3px;margin-bottom:1rem;overflow:hidden;}
.pgbar{height:100%;background:linear-gradient(90deg,var(--tf) 0%,var(--tfm) 100%);border-radius:3px;transition:width .1s linear;}
.ctrls{display:flex;gap:8px;}
.cbtn{flex:1;padding:8px;font-size:12px;font-weight:600;border:1.5px solid rgba(10,186,181,.3);
  border-radius:10px;cursor:pointer;background:#fff;color:var(--tfd);font-family:'Poppins',sans-serif;transition:all .15s;}
.cbtn:hover{background:var(--tfl);border-color:var(--tf);}
#pbtn{background:var(--tfl);}
.dots{display:flex;gap:5px;margin-top:1rem;}
.dot{flex:1;height:4px;border-radius:2px;background:rgba(10,186,181,.15);transition:background .3s;}
.dot.done{background:var(--tfm);}
.dot.on{background:var(--tf);box-shadow:0 0 6px rgba(10,186,181,.45);}

.donecard{background:#fff;border:1.5px solid rgba(10,186,181,.2);border-radius:15px;
  padding:2.5rem 1.5rem;text-align:center;margin:0 1rem;display:none;}
.donebig{font-size:22px;font-weight:900;color:var(--tf);font-family:'Nunito',sans-serif;margin-bottom:8px;}
.donesub{font-size:13px;color:#aaa;margin-bottom:1.2rem;}
.dav{width:68px;height:68px;border-radius:50%;border:2.5px solid var(--tf);
  overflow:hidden;margin:0 auto 1rem;box-shadow:0 4px 14px rgba(10,186,181,.22);}
.dav img{width:100%;height:100%;object-fit:cover;object-position:50% 10%;}

/* ===== PC レスポンシブ ===== */
@media (min-width: 600px) {
  .app { max-width: 720px; }
  .htitle { font-size: 20px; }
  .hsub { font-size: 13px; }
  .av { width: 80px; height: 80px; }
  .hdr { padding: 1.4rem 2rem 1.5rem; gap: 18px; }
  .badge { font-size: 11px; padding: 3px 10px; }
  .tabs { margin: 1.2rem 1.5rem 0; }
  .tab { font-size: 15px; padding: 9px 12px; }
  .slbl { font-size: 13px; margin: 1.3rem 1.5rem .6rem; }
  .mgrid { margin: 0 1.5rem; gap: 10px; }
  .mc { padding: 14px 10px; border-radius: 14px; }
  .mi { font-size: 26px; margin-bottom: 5px; }
  .mt { font-size: 13px; }
  .ms { font-size: 12px; }
  .pgrid { margin: 0 1.5rem; gap: 10px; }
  .pc { padding: 13px 16px; border-radius: 14px; }
  .pt { font-size: 14px; }
  .ps { font-size: 12px; }
  .sbox { margin: 0 1.5rem; padding: 1.1rem 1.3rem; }
  .sr { grid-template-columns: 80px 1fr 80px 28px; gap: 10px; }
  .sr .sl { font-size: 14px; }
  .sr input { font-size: 15px; padding: 6px 10px; }
  .sr .sw { font-size: 12px; }
  .gobtn { width: calc(100% - 3rem); margin: 1.3rem 1.5rem 0; padding: 15px; font-size: 17px; border-radius: 16px; }
  .pwrap { margin: 0 1.5rem; padding: 1.5rem; border-radius: 18px; }
  .rbadge { font-size: 13px; padding: 4px 16px; }
  .rspd { font-size: 13px; }
  .tdisplay { font-size: 18px; line-height: 2.1; padding: 1.3rem 1.5rem; min-height: 220px; border-radius: 14px; }
  .pgwrap { height: 8px; border-radius: 4px; margin-bottom: 1.2rem; }
  .ctrls { gap: 10px; }
  .cbtn { padding: 10px; font-size: 14px; border-radius: 12px; }
  .dots { gap: 7px; margin-top: 1.2rem; }
  .dot { height: 5px; border-radius: 3px; }
  .donecard { margin: 0 1.5rem; padding: 3rem 2rem; border-radius: 18px; }
  .donebig { font-size: 28px; }
  .donesub { font-size: 15px; }
  .dav { width: 88px; height: 88px; }
  .ja-line { font-size: 14px; }
  .en-line { font-size: 18px; }
}

@media (min-width: 900px) {
  .app { max-width: 860px; }
  .htitle { font-size: 24px; }
  .av { width: 90px; height: 90px; }
  .hdr { padding: 1.6rem 2.5rem 1.7rem; gap: 22px; }
  .tabs { margin: 1.5rem 2rem 0; }
  .tab { font-size: 16px; padding: 10px 14px; }
  .slbl { font-size: 14px; margin: 1.5rem 2rem .7rem; }
  .mgrid { margin: 0 2rem; gap: 12px; }
  .mc { padding: 18px 12px; }
  .mi { font-size: 30px; }
  .mt { font-size: 14px; }
  .ms { font-size: 12px; }
  .pgrid { margin: 0 2rem; gap: 12px; }
  .pc { padding: 16px 20px; }
  .pt { font-size: 15px; }
  .sbox { margin: 0 2rem; }
  .gobtn { width: calc(100% - 4rem); margin: 1.5rem 2rem 0; padding: 17px; font-size: 19px; }
  .pwrap { margin: 0 2rem; padding: 1.8rem; }
  .tdisplay { font-size: 20px; line-height: 2.2; padding: 1.5rem 1.8rem; min-height: 260px; }
  .cbtn { padding: 12px; font-size: 15px; }
  .donecard { margin: 0 2rem; }
  .donebig { font-size: 32px; }
  .ja-line { font-size: 16px; }
  .en-line { font-size: 20px; }
}
</style>
</head>
<body>
<div class="app">
<div class="hdr">
  <div class="av"><img id="avimg" alt="コーチ"></div>
  <div class="htx">
    <p class="hsub">英語コーチ監修アプリ</p>
    <p class="htitle">英語耳🔛スイッチオン♪<br>Speed Reading Trainer</p>
    <span class="badge">⌨️ Typewriter Ver.</span>
  </div>
</div>

<div class="tabs">
  <button class="tab active" id="ts" onclick="showTab('s')">設定</button>
  <button class="tab" id="tp" onclick="showTab('p')">トレーニング</button>
</div>

<div id="panel-s">
  <p class="slbl">モードを選ぶ</p>
  <div class="mgrid">
    <div class="mc sel" id="mc0" onclick="selMode(0)"><p class="mi">📖</p><p class="mt">英文のみ</p><p class="ms">英語を1文字ずつ表示</p></div>
    <div class="mc" id="mc1" onclick="selMode(1)"><p class="mi">🇯🇵→🇺🇸</p><p class="mt">日本語→英語</p><p class="ms">日本語の下に英語</p></div>
    <div class="mc" id="mc2" onclick="selMode(2)"><p class="mi">✨</p><p class="mt">同時表示</p><p class="ms">日英を同時にタイプ</p></div>
  </div>
  <p class="slbl">英文を選ぶ</p>
  <div class="pgrid" id="pgrid"></div>
  <p class="slbl">ラウンド設定</p>
  <div class="sbox"><div id="srows"></div><button class="addb" onclick="addRound()">＋ ラウンドを追加</button></div>
  <button class="gobtn" onclick="begin()">⌨️ トレーニング開始</button>
  <div style="height:1.5rem"></div>
</div>

<div id="panel-p" style="display:none;margin-top:1rem;">
  <div class="pwrap" id="pbox">
    <div class="rmeta"><span class="rbadge" id="rlabel">Round 1</span><span class="rspd" id="rspd"></span></div>
    <div class="tdisplay" id="tdisplay"><span class="cursor"></span></div>
    <div class="pgwrap"><div class="pgbar" id="pbar" style="width:0%"></div></div>
    <div class="ctrls">
      <button class="cbtn" id="pbtn" onclick="togglePause()">一時停止</button>
      <button class="cbtn" onclick="skipRound()">次へ →</button>
      <button class="cbtn" onclick="stopAll()">終了</button>
    </div>
    <div class="dots" id="dotrow"></div>
  </div>
  <div class="donecard" id="donebox">
    <div class="dav"><img id="avimg2" alt="コーチ"></div>
    <p class="donebig">🎉 すばらしい！完了！</p>
    <p class="donesub" id="donesub"></p>
    <button class="gobtn" onclick="restart()" style="width:auto;display:inline-block;padding:10px 32px;margin:0 auto;">もう一度</button>
  </div>
  <div style="height:1rem"></div>
</div>
</div>

const PRESETS=[
  {title:"Brain & Prediction",sub:"脳科学・予測処理",chunks:[
    {en:"The human brain",ja:"人間の脳は"},
    {en:"is a remarkable organ",ja:"すばらしい器官です"},
    {en:"that constantly processes information",ja:"絶えず情報を処理している"},
    {en:"from the world around us.",ja:"私たちを取り巻く世界から。"},
    {en:"When we read text,",ja:"文章を読むとき、"},
    {en:"our eyes do not move smoothly",ja:"目は滑らかには動かず"},
    {en:"across the page.",ja:"ページ上を。"},
    {en:"Instead, they make rapid jumps",ja:"代わりに素早いジャンプをします"},
    {en:"called saccades,",ja:"サッカードと呼ばれる"},
    {en:"pausing briefly on groups of words.",ja:"単語のまとまりで短く止まりながら。"},
    {en:"During these pauses,",ja:"この停止の間に"},
    {en:"the brain works to extract meaning,",ja:"脳は意味を引き出そうとします、"},
    {en:"predicting what comes next",ja:"次に来るものを予測しながら"},
    {en:"based on context and prior knowledge.",ja:"文脈と既知の知識をもとに。"},
    {en:"This predictive processing",ja:"この予測的な処理が"},
    {en:"is fundamental to how we understand language.",ja:"言語理解の根本です。"},
    {en:"Research shows that skilled readers",ja:"熟練した読者は"},
    {en:"can anticipate upcoming words",ja:"次の単語を予測できます"},
    {en:"before they appear,",ja:"それが現れる前に、"},
    {en:"allowing them to comprehend text",ja:"テキストを理解することを可能にし"},
    {en:"much faster than novice readers.",ja:"初心者よりずっと速く。"},
    {en:"By training ourselves to read at higher speeds,",ja:"高速で読む訓練をすることで"},
    {en:"we can strengthen these neural pathways",ja:"神経経路を強化できます"},
    {en:"and improve our ability",ja:"そして能力を高められます"},
    {en:"to process spoken language as well.",ja:"話し言葉を処理する能力も。"},
    {en:"The strong connection",ja:"強い結びつきがあります"},
    {en:"between visual reading speed",ja:"視覚的な読書速度と"},
    {en:"and listening comprehension",ja:"リスニング理解力の間に"},
    {en:"is well established in cognitive neuroscience.",ja:"認知神経科学において確立されています。"},
    {en:"When the brain becomes accustomed",ja:"脳が慣れると"},
    {en:"to processing text rapidly,",ja:"テキストを速く処理することに、"},
    {en:"it also becomes better",ja:"同時に上手くなります"},
    {en:"at understanding fast speech in a second language,",ja:"第二言語の速い発話を理解することも、"},
    {en:"because both skills rely",ja:"なぜなら両方のスキルが依存しているから"},
    {en:"on the same predictive mechanisms",ja:"同じ予測メカニズムに"},
    {en:"built deep in our minds.",ja:"私たちの心の奥深くに組み込まれた。"},
    {en:"Regular practice with accelerated reading",ja:"加速読みの定期的な練習は"},
    {en:"gradually rewires the brain over time,",ja:"時間をかけて徐々に脳を再配線し、"},
    {en:"creating lasting improvements",ja:"持続的な改善をもたらします"},
    {en:"that carry over naturally",ja:"自然に波及する"},
    {en:"into everyday listening",ja:"日常のリスニングへと"},
    {en:"and real conversations with native speakers.",ja:"ネイティブとの実際の会話へと。"}
  ]},
  {title:"Travel & Freedom",sub:"旅・自由な生き方",chunks:[
    {en:"There is something deeply liberating",ja:"深く解放的なものがあります"},
    {en:"about waking up",ja:"目覚めることには"},
    {en:"in a city you have never visited before.",ja:"一度も訪れたことのない街で。"},
    {en:"The streets feel alive with possibility,",ja:"通りは可能性に満ちて生き生きしています、"},
    {en:"and every corner holds a story",ja:"そしてすべての角に物語が"},
    {en:"waiting to be discovered.",ja:"発見されるのを待っています。"},
    {en:"Many people dream of living this way permanently,",ja:"多くの人がこのような生き方を永続的に夢見ています、"},
    {en:"building a life that moves freely with them",ja:"自由に一緒に動いていく人生を築きながら"},
    {en:"rather than anchoring them to one fixed place.",ja:"一つの決まった場所に縛りつけるのではなく。"},
    {en:"With the rise of remote work",ja:"リモートワークの台頭とともに"},
    {en:"and powerful digital communication tools,",ja:"強力なデジタルコミュニケーションツールの、"},
    {en:"this dream has become more achievable than ever",ja:"この夢はかつてないほど実現可能になりました"},
    {en:"for motivated people all around the world.",ja:"世界中のやる気のある人々にとって。"},
    {en:"Professionals in many different fields",ja:"多くの異なる分野のプロフェッショナルが"},
    {en:"can now earn a comfortable living from anywhere",ja:"今やどこからでも快適な生活費を稼げます"},
    {en:"with just a reliable internet connection.",ja:"信頼できるインターネット接続さえあれば。"},
    {en:"Language skills play a truly crucial role",ja:"語学力は本当に重要な役割を果たします"},
    {en:"in making this lifestyle sustainable long-term.",ja:"このライフスタイルを長期的に持続可能にする上で。"},

let rounds=[{sec:60},{sec:50},{sec:40},{sec:30},{sec:20},{sec:15},{sec:10}];
let selPreset=0,selModeIdx=0,chunks=[];
let curRound=0,paused=false;
let roundStartTime=null,accumulatedTime=0,totalDuration=0;
let finished=false,timerId=null;
// タイプライター用
let fullText='',displayedCount=0,totalChars=0;

function selMode(i){selModeIdx=i;[0,1,2].forEach(j=>{document.getElementById('mc'+j).className='mc'+(j===i?' sel':'')+'';});}
function showTab(t){
  document.getElementById('ts').className='tab'+(t==='s'?' active':'');
  document.getElementById('tp').className='tab'+(t==='p'?' active':'');
  document.getElementById('panel-s').style.display=t==='s'?'block':'none';
  document.getElementById('panel-p').style.display=t==='p'?'block':'none';
}
function buildPresets(){
  const g=document.getElementById('pgrid');g.innerHTML='';
  PRESETS.forEach((p,i)=>{
    const c=document.createElement('div');c.className='pc'+(i===selPreset?' sel':'');
    c.innerHTML='<p class="pt">'+p.title+'</p><p class="ps">'+p.sub+'</p>';
    c.onclick=()=>{selPreset=i;buildPresets();renderSpeeds();};g.appendChild(c);
  });
}
function renderSpeeds(){
  const wc=PRESETS[selPreset].chunks.reduce((a,c)=>a+c.en.split(/\s+/).length,0);
  const c=document.getElementById('srows');c.innerHTML='';
  rounds.forEach((r,i)=>{
    const wpm=Math.round(wc/(r.sec/60));
    const d=document.createElement('div');d.className='sr';
    d.innerHTML='<span class="sl">Round '+(i+1)+'</span><input type="number" min="1" max="999" value="'+r.sec+'" onchange="rounds['+ i +'].sec=Math.max(1,parseInt(this.value)||1);renderSpeeds()"><span class="sw">'+ wpm +' wpm</span><button class="rmb" onclick="removeRound('+ i +')">✕</button>';
    c.appendChild(d);
  });
}
function addRound(){const l=rounds[rounds.length-1];rounds.push({sec:Math.max(5,Math.round(l.sec*.75))});renderSpeeds();}
function removeRound(i){if(rounds.length<=1)return;rounds.splice(i,1);renderSpeeds();}

// テキスト構築：モードによって文字列を生成
function buildFullText(){
  const m=selModeIdx;
  const c=PRESETS[selPreset].chunks;
  if(m===0){
    // 英文のみ：全チャンクをスペース区切りで連結
    return c.map(ch=>ch.en).join(' ');
  } else if(m===1){
    // 日本語→英語：チャンクごとに日本語→改行→英語→改行
    return c.map(ch=>ch.ja+'\n'+ch.en).join('\n');
  } else {
    // 同時：チャンクごとに日本語と英語を同時（交互に1文字ずつ）
    // 実装：日本語行＋英語行をセットで表示
    return c.map(ch=>ch.ja+'\n'+ch.en).join('\n');
  }
}

function begin(){
  chunks=PRESETS[selPreset].chunks;curRound=0;showTab('p');
  document.getElementById('donebox').style.display='none';
  document.getElementById('pbox').style.display='block';
  buildDots();launchRound();
}
function buildDots(){
  const c=document.getElementById('dotrow');c.innerHTML='';
  rounds.forEach((_,i)=>{const d=document.createElement('div');d.className='dot';d.id='d'+i;c.appendChild(d);});
}
function updateDots(){rounds.forEach((_,i)=>{const d=document.getElementById('d'+i);if(!d)return;d.className='dot'+(i<curRound?' done':i===curRound?' on':'');});}

function launchRound(){
  if(timerId)clearInterval(timerId);
  paused=false;finished=false;accumulatedTime=0;displayedCount=0;
  roundStartTime=performance.now();
  document.getElementById('pbtn').textContent='一時停止';

  // テキスト構築
  fullText=buildFullText();
  totalChars=fullText.length;
  totalDuration=rounds[curRound].sec*1000;

  const wc=chunks.reduce((a,c)=>a+c.en.split(/\s+/).length,0);
  document.getElementById('rlabel').textContent='Round '+(curRound+1)+' / '+rounds.length;
  document.getElementById('rspd').textContent=rounds[curRound].sec+'秒 · '+wc+' words';
  updateDots();

  // 表示エリアをクリア
  document.getElementById('tdisplay').innerHTML='<span class="cursor"></span>';
  document.getElementById('pbar').style.width='0%';

  // 先頭にスクロール
  window.scrollTo({top:document.getElementById('pbox').offsetTop-10,behavior:'smooth'});

  // タイプライタータイマー：1文字あたりのms
  const msPerChar=totalDuration/totalChars;
  timerId=setInterval(typeNextChar,Math.max(16,msPerChar));
}

function typeNextChar(){
  if(paused||finished)return;
  if(displayedCount>=totalChars){
    clearInterval(timerId);
    finished=true;
    renderFull();
    document.getElementById('pbar').style.width='100%';
    setTimeout(()=>{
      if(curRound<rounds.length-1){curRound++;launchRound();}else showDone();
    },600);
    return;
  }

  // 複数文字をまとめて表示（スピードが速い場合）
  const elapsed=performance.now()-roundStartTime+accumulatedTime;
  const targetCount=Math.floor((elapsed/totalDuration)*totalChars);
  const toAdd=Math.min(targetCount-displayedCount, 10);
  if(toAdd>0){
    displayedCount=Math.min(displayedCount+toAdd, totalChars);
  } else {
    displayedCount=Math.min(displayedCount+1, totalChars);
  }

  renderDisplay();
  const progress=displayedCount/totalChars;
  document.getElementById('pbar').style.width=Math.round(progress*100)+'%';
}

function renderDisplay(){
  const m=selModeIdx;
  const shown=fullText.slice(0,displayedCount);

  let html='';
  if(m===0){
    // 英文のみ：そのまま表示
    html=escHtml(shown)+'<span class="cursor"></span>';
  } else {
    // 日本語→英語 / 同時：行ごとに色分け
    const lines=shown.split('\n');
    const totalLines=fullText.split('\n');
    lines.forEach((line,li)=>{
      const isJA=li%2===0; // 偶数行=日本語、奇数行=英語
      const isLast=li===lines.length-1;
      if(isJA){
        html+='<span class="ja-line">'+escHtml(line)+(isLast?'<span class="cursor"></span>':'')+'</span>';
      } else {
        html+='<span class="en-line">'+escHtml(line)+(isLast?'<span class="cursor"></span>':'')+'</span>';
      }
    });
  }
  document.getElementById('tdisplay').innerHTML=html;
}

function renderFull(){
  const m=selModeIdx;
  let html='';
  if(m===0){
    html=escHtml(fullText);
  } else {
    const lines=fullText.split('\n');
    lines.forEach((line,li)=>{
      const isJA=li%2===0;
      html+=isJA
        ?'<span class="ja-line">'+escHtml(line)+'</span>'
        :'<span class="en-line">'+escHtml(line)+'</span>';
    });
  }
  document.getElementById('tdisplay').innerHTML=html;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function togglePause(){
  if(!paused){
    paused=true;
    accumulatedTime+=performance.now()-roundStartTime;
    document.getElementById('pbtn').textContent='再開';
  } else {
    paused=false;
    roundStartTime=performance.now();
    document.getElementById('pbtn').textContent='一時停止';
  }
}
function skipRound(){
  if(timerId)clearInterval(timerId);
  if(curRound<rounds.length-1){curRound++;launchRound();}else showDone();
}
function stopAll(){if(timerId)clearInterval(timerId);showTab('s');}
function showDone(){
  if(timerId)clearInterval(timerId);updateDots();
  document.getElementById('pbox').style.display='none';
  document.getElementById('donebox').style.display='block';
  const wc=chunks.reduce((a,c)=>a+c.en.split(/\s+/).length,0);
  document.getElementById('donesub').textContent=rounds.length+'ラウンド完了！最終スピード '+rounds[rounds.length-1].sec+'秒 / '+wc+' words';
}
function restart(){
  document.getElementById('donebox').style.display='none';
  document.getElementById('pbox').style.display='block';
  curRound=0;buildDots();launchRound();
}

buildPresets();renderSpeeds();
</script>
